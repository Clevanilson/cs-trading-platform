services:
  cs-trading-platform-api-gateway:
    build:
      context: .
      dockerfile: ./backend/api_gateway/build/Dockerfile.dev
    restart: unless-stopped
    container_name: cs-trading-platform-api-gateway
    ports:
      - 80:80
    depends_on:
      - cs-trading-platform-account-service
      - cs-trading-platform-order-service
      - cs-trading-platform-matching-service
    volumes:
      - ./backend/api_gateway/nginx.conf:/etc/nginx/nginx.conf
  cs-trading-platform-account-service:
    build:
      context: .
      dockerfile: ./backend/account_service/build/Dockerfile.dev
    restart: unless-stopped
    environment:
      - PORT=3001
    container_name: cs-trading-platform-account-service
    volumes:
      - ./backend/account_service:/app/backend/account_service
      - ./backend/devpack:/app/backend/devpack
    ports: 
      - 3001:3001
    depends_on:
      rabbitmq:
        condition: service_healthy
  cs-trading-platform-order-service:
    build:
      context: .
      dockerfile: ./backend/order_service/build/Dockerfile.dev
    restart: unless-stopped
    environment:
      - PORT=3002
    container_name: cs-trading-platform-order-service
    volumes:
      - ./backend/order_service:/app/backend/order_service
      - ./backend/devpack:/app/backend/devpack
    ports: 
      - 3002:3002
    depends_on:
      rabbitmq:
        condition: service_healthy
  cs-trading-platform-matching-service:
    build:
      context: .
      dockerfile: ./backend/matching_service/build/Dockerfile.dev
    restart: unless-stopped
    environment:
      - PORT=3003
    container_name: cs-trading-platform-matching-service
    volumes:
      - ./backend/matching_service:/app/backend/matching_service
      - ./backend/devpack:/app/backend/devpack
    ports: 
      - 3003:3003
    depends_on:
      rabbitmq:
        condition: service_healthy
  cs-trading-platform-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    container_name: cs-trading-platform-frontend
    environment:
      - VITE_ACCOUNT_API_URL=/api/account
      - VITE_ORDER_API_URL=/api/order
      - ACCOUNT_PROXY_TARGET=http://cs-trading-platform-account-service:3001
      - ORDER_PROXY_TARGET=http://cs-trading-platform-order-service:3002
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - 5173:5173
    depends_on:
      - cs-trading-platform-account-service
      - cs-trading-platform-order-service
  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:management-alpine
    restart: unless-stopped
    ports:
      - 15672:15672
      - 5672:5672
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
